<!DOCTYPE html>

    <style>
        :root {
            --neon-green: #00ff41;
            --danger-red: #ff4444;
            --gold: #ffd700;
            --frozen-gray: #444;
        }

        body { background: #050505; color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        
        .vault-wrapper { max-width: 1000px; margin: auto; text-align: center; }
        .vault-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }

        .app-card {
            background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px;
            cursor: pointer; position: relative; transition: 0.4s;
        }

        .app-card.unconfigured { border: 1px dashed var(--neon-green); opacity: 0.8; }
        .app-card.sealed { border: 1px solid var(--danger-red); background: rgba(255,0,0,0.05); }
        .app-card.accepted { border: 1px solid var(--gold); box-shadow: 0 0 15px var(--gold); transform: scale(1.05); }
        .app-card.frozen { border: 2px solid var(--frozen-gray); opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .app-icon { width: 50px; height: 50px; margin-bottom: 10px; }
        .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 10px; color: #000; font-weight: bold; }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal.active { display: flex; }
        
        .chamber {
            background: #000; border: 2px solid var(--neon-green); padding: 40px;
            border-radius: 20px; width: 400px; position: relative; text-align: center;
        }

        .input-wrapper { position: relative; margin: 25px 0; }
        .key-input {
            width: 100%; padding: 12px; background: #111; border: 1px solid var(--neon-green);
            color: white; font-size: 18px; text-align: center; box-sizing: border-box;
        }
        
        .eye-toggle {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            cursor: pointer; font-size: 20px;
        }

        .btn { padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin: 5px; border-radius: 5px; }
        .btn-seal { background: var(--neon-green); color: black; }
        .btn-unseal { background: var(--danger-red); color: white; }
        .btn-close { background: #333; color: white; }
   
   /* 🛡️ Option 1: Neon Scanning Beam styling */
        .scanning-beam {
            width: 150px; /* Beam ki width */
            height: 2px; /* Patli laser line */
            background: var(--neon-green);
            margin: 10px auto; /* Title ke neeche gap */
            box-shadow: 0 0 10px var(--neon-green);
            animation: scanning 1.5s ease-in-out infinite;
        }

        /* 🎬 Animation logic */
        @keyframes scanning {
            0%, 100% { transform: scaleX(1); opacity: 1; }
            50% { transform: scaleX(1.5); opacity: 0.5; }
        }</style>
</head>

    // 2. Main Render Function (Grid Setup)
    function renderApps() {
        const grid = document.getElementById('vaultGrid');
        if(!grid) return; 
        grid.innerHTML = '';
        
        apps.forEach(app => {
            const data = registry[app.id] || {};
            let state = 'unconfigured';
            let pillColor = 'var(--neon-green)';

            if (data.frozen) {
                state = 'frozen';
                pillColor = 'var(--frozen-gray)';
            } else if (data.unlocked) {
                state = 'accepted';
                pillColor = 'var(--gold)';
            } else if (data.key) {
                state = 'sealed';
                pillColor = 'var(--danger-red)';
            }
            
            grid.innerHTML += `
                <div class="app-card ${state}" onclick="openChamber('${app.id}')">
                    <span class="status-pill" style="background:${pillColor}">${state.toUpperCase()}</span>

                    <img src="${app.icon}" class="app-icon">
                    <div>${app.name}</div>
                </div>
            `;
        });
    }


function openChamber(id) {
    const app = apps.find(a => a.id === id);
    const modal = document.getElementById('vaultModal');
    const chamber = document.getElementById('modalChamber');
    const data = registry[id] || {};

    modal.classList.add('active');

    // 1. Check if Ticket is Pending
    if (data.ticketPending) {
        showTicketView(id); 
        return; 
    }

    // 2. Check if Frozen (3 Strikes)
    if (data.frozen) {
        chamber.innerHTML = `

        `;

    else if (data.deactivated) {
        chamber.innerHTML = `

        `;

    // 4. Check if Unconfigured (First Time) 🟢

                <input type="password" id="keyField" class="key-input" placeholder="Create Sovereign Key">

            </div>
            <p style="font-size:10px; color:var(--gold)">*Security: SHA-256 Encryption Active</p>
            <button class="btn btn-seal" onclick="saveKey('${id}')">SEAL VAULT</button>
            <button class="btn btn-close" onclick="closeModal()">CANCEL</button>
        `;
    } 
    // 5. Check if Unlocked/Accepted (Bypass Mode) 🟡
    else if (data.unlocked) { 
        chamber.innerHTML = `
            <h2 style="color:var(--gold)">👑 SOVEREIGN ACCESS RESTORED</h2>
            <p style="font-size:12px; color:var(--frozen-gray);">The handshake is active. Re-verify your original key to enter.</p>
            <div style="margin-top:20px;">
                <input type="password" id="keyField" class="key-input" placeholder="Enter Original Sovereign Key">
                <button class="btn btn-unseal" style="width:100%; margin-top:10px;" onclick="unseal('${id}')">VERIFY & ACCESS</button>
                <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                <button class="btn btn-close" style="width:100%; border-color:var(--danger-red); color:var(--danger-red)" onclick="disconnectApp('${id}')">DISCONNECT & PURGE</button>
            </div>
        `;
    }
    // 6. Default: Locked (Normal State) 🔴
    else {

    // 🔐 SUPER SECURE SAVE: Hashing the key (One-Way)
function saveKey(id) {
    const keyVal = document.getElementById('keyField').value;
    const recoveryVal = document.getElementById('recoveryField').value;
    
    if(!keyVal || !recoveryVal) return alert("All codes required!");

    // SHA-256 Hashing: Isse reverse karna IMPOSSIBLE hai
    const hashedKey = CryptoJS.SHA256(keyVal).toString();
    const hashedRecovery = CryptoJS.SHA256(recoveryVal).toString();

    registry[id] = { 
        key: hashedKey, 
        recoveryCode: hashedRecovery, 
        unlocked: false, 
        attempts: 0, 
        frozen: false 
    };
    sync();
}



function unseal(id) {
    const val = document.getElementById('keyField').value.trim();
    const data = registry[id];
    
    // User input ko hash karo (Hacker-proof)
    const inputHash = CryptoJS.SHA256(val).toString();

    if (inputHash === data.key) {
        data.unlocked = true;
        data.attempts = 0; // Reset attempts on success
        sync();
        window.open(apps.find(a => a.id === id).url, '_blank');
    } else {
        // 🚨 3-Attempts Logic
        data.attempts = (data.attempts || 0) + 1;
        const remaining = 3 - data.attempts;
        
        if (remaining <= 0) {
            data.frozen = true;
            alert("🚨 CRITICAL: 3 Failed Attempts. Vault is now FROZEN.");
        } else {
            alert(`🚫 MISMATCH. Warning: ${remaining} attempts remaining.`);
        }
        sync();
    }
}
   

    function triggerReflip(id) {
        const inputCode = document.getElementById('recoveryField').value;
        
        if (inputCode === registry[id].recoveryCode) {
            alert("VERIFICATION SUCCESSFUL. Raja, the vault has been reset.");
            delete registry[id]; // Resets to 'Unconfigured'
            sync();
        } else {
            alert("CRITICAL ERROR: Recovery Code Mismatch. System remains Frozen.");
        }
    }

    // 5. Utility Functions
    function sync() {
        localStorage.setItem('gnov_sensitive_vault', JSON.stringify(registry));
        renderApps();
        closeModal();
    }

    function closeModal() {
        document.getElementById('vaultModal').classList.remove('active');
    }

    function toggleKey() {
        const x = document.getElementById("keyField");
        x.type = (x.type === "password") ? "text" : "password";
    }

    window.onload = renderApps;

async function submitPetition(appName, id) {


    registry[id].ticketPending = true; 
    sync(); // Ye local storage mein save kar dega

    showTicketView(id);

    const name = document.getElementById('pName').value;
    const uEmail = document.getElementById('pEmail').value;
    const phone = document.getElementById('pPhone').value;
    const reason = document.getElementById('pReason').value;

    if(!name || !uEmail || !phone || !reason) {
        return alert("Commander, all fields are mandatory for identity verification!");
    }

    // 🚀 Background Email Dispatch (Using Formspree for Silent Send)
    const formData = new FormData();
    formData.append('Commander_Name', name);
    formData.append('App_Target', appName);
    formData.append('User_Email', uEmail);
    formData.append('Phone', phone);
    formData.append('Reason', reason);

    // 🎫 Step 2: Show "Ticket Raised" View (Immediate Feedback)
    const chamber = document.getElementById('modalChamber');

                Community has been notified. We are verifying your identity.<br>
                <span style="color:var(--gold)">Keep an eye on your <b>Email Inbox</b> for the Access Code. <br>
                <b>CAUTION:</b> The Admin Code is valid for 3 attempts only. Do not guess!</span>
            </p>
            <div class="input-wrapper" style="margin-top:20px;">
                <input type="text" id="adminAccessCode" class="key-input" placeholder="Paste Access Code Here">
            </div>
            <button class="btn btn-seal" style="width:100%; margin-top:10px;" onclick="verifyAdminCode('${id}')">VALIDATE & REFLIP</button>
            <button class="btn btn-close" style="margin-top:10px; opacity:0.6;" onclick="closeModal()">RETURN TO KINGDOM</button>

    // 🌐 Actual background sending

        console.log("Dispatch Successful to jeevanshripal6@gmail.com");

}

let adminAttempts = 0; // Tracking access code attempts

function verifyAdminCode(id) {
    const enteredCode = document.getElementById('adminAccessCode').value;
    const correctCode = "GNOV2026"; // Code jo hum email karenge

    if (enteredCode === correctCode) {
        alert("🚨 ACCESS GRANTED BY COMMUNITY! Vault is now Unfrozen.");
        delete registry[id]; // Reset the app
        adminAttempts = 0;
        sync();
    } else {
        adminAttempts++;
        const left = 3 - adminAttempts;
        if (left <= 0) {
            alert("🚨 CRITICAL BREACH: Admin Code Failed 3 Times. System Lockdown.");
            closeModal();
        } else {
            alert(`🚫 INVALID ACCESS CODE. Warning: ${left} attempts remaining.`);

}

function startFingerprintScan(id) {

function verifyDualSeal(id) {
    const enteredCode = document.getElementById('adminAccessCode').value.trim();
    const secureHash = "7ee92e799a2282d948a5b2a03917df7ea7233aafc413fd64d0edfa5847499ea3"; // GNOV2026 hash

    try {
        const inputHash = CryptoJS.SHA256(enteredCode.toUpperCase()).toString();

        if (inputHash === secureHash) {
            
            // 🛡️ Condition 2: Check if this "Emergency Key" was already used
            if (registry[id] && registry[id].tokenUsed) {
                alert("🚫 SECURITY BREACH: This Admin Key has already been used once. It is now VOID. Contact Community for a new one.");
                closeModal();
                return;
            }

            alert("🚨 ONE-TIME ACCESS GRANTED! Status: ACCEPTED ✅");

            // 🛡️ Condition 1: Direct Accepted State
            if (registry[id]) {
                registry[id].frozen = false;
                registry[id].unlocked = true; 
                registry[id].attempts = 0;
                registry[id].ticketPending = false;
                
                // Mark this app's token as USED forever
                registry[id].tokenUsed = true; 
            }

            localStorage.setItem('gnov_sensitive_vault', JSON.stringify(registry));
            renderApps();
            closeModal();

            // Redirect to App
            const app = apps.find(a => a.id === id);
            if(app) window.open(app.url, '_blank');

        } else {
            alert("🚫 INVALID KEY. Verification Failed.");
        }
    } catch (err) {
        console.error(err);
    }
}





function disconnectApp(id) {
    if(confirm("🚨 TERMINATE SESSION? Vault will enter De-activated mode.")) {
        if (registry[id]) {
            // 1. Flag set karo
            registry[id].deactivated = true; 
            registry[id].unlocked = false; 
            
            // 2. Save karo
            localStorage.setItem('gnov_sensitive_vault', JSON.stringify(registry));
            
            // 3. 🚨 YE ZAROORI HAI: Dashboard ko refresh karo
            renderApps(); 
            closeModal();
        }
    }
}








// Is logic ko renderApps ke loop ke andar dalo (Jahan status decide hota hai)
function renderApps() {
    const grid = document.getElementById('vaultGrid');
    if(!grid) return; 
    grid.innerHTML = '';
    
    apps.forEach(app => {
        const data = registry[app.id] || {};
        let state = 'unconfigured';
        let pillColor = 'var(--neon-green)';

        // ⭐ STATUS HIERARCHY (Sequence Matters!)
        if (!data.key) {
            state = 'unconfigured';
            pillColor = 'var(--neon-green)';
        } 
        // 1. Sabse pehle Deactivated check karo
        else if (data.deactivated) {
            state = 'deactivated';
            pillColor = '#bb86fc';
           
        }
        else if (data.frozen) {
            state = 'frozen';
            pillColor = 'var(--frozen-gray)';
        } 
        else if (data.unlocked) {
            state = 'accepted';
            pillColor = 'var(--gold)';
        } 
        else if (data.key) {
            state = 'sealed';
            pillColor = 'var(--danger-red)';
        }
        
        grid.innerHTML += `
            <div class="app-card ${state}" onclick="openChamber('${app.id}')">
                <span class="status-pill" style="background:${pillColor}">${state.toUpperCase()}</span>
                <br>
                <img src="${app.icon}" class="app-icon">
                <div>${app.name}</div>
            </div>
        `;
    });
}



///////////////////////////


function processReconnect(id) {
    const code = document.getElementById('reconnectHash').value.trim();
    const secureHash = "$2y$10$LDv7Ujiu6/cPspag0T1aWuI/dn2QYAubA3RBZbp3j7mjGU.0RxzQq"; // GNOV2026

    const inputHash = CryptoJS.SHA256(code.toUpperCase()).toString();

    if (inputHash === secureHash) {
        alert("✅ HASH VERIFIED: System Purging... Vault is now ready for RE-INITIALIZATION.");

        // 🚨 YAHAN HAI JADOO: Data uda do taaki card Gray (Unconfigured) ho jaye
        delete registry[id]; 
        
        localStorage.setItem('gnov_sensitive_vault', JSON.stringify(registry));
        
        // 🔄 Dashboard refresh karo taaki card Gray dikhe
        renderApps();
        
        // 🔓 Modal mein turant "Initialize" wala interface dikhao
        openChamber(id); 
        
    } else {
        alert("🚫 INVALID HASH: Security Protocol Denied Re-connection.");
    }
}

<script>

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);

// Screen sizing
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Numbers settings
let fontSize = 16;
let columns = Math.floor(width / fontSize);
let drops = new Array(columns).fill(1);

function draw() {
    // Ye background ko halka kala rakhta hai taaki "Tail" (ponchh) dikhe
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
    ctx.fillRect(0, 0, width, height);

    // Bright Neon Green color
    ctx.fillStyle = '#00ff9d'; 
    ctx.font = fontSize + 'px monospace';
    ctx.shadowBlur = 8; // Numbers mein glow aayega
    ctx.shadowColor = '#00ff9d';

    for (let i = 0; i < drops.length; i++) {
        // Random 0 or 1
        const text = Math.floor(Math.random() * 2);
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        // Reset drop to top randomly
        if (drops[i] * fontSize > height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}

// Window resize handle
window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    columns = Math.floor(width / fontSize);
    drops = new Array(columns).fill(1);
});

setInterval(draw, 50);
</script>
